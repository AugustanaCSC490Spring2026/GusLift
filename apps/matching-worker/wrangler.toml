name = "guslift-matching"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "MATCHING_ROOM", class_name = "MatchingRoom" }
]

[[migrations]]
tag = "v1"
# Free plan requires SQLite-backed Durable Objects (see Cloudflare error 10097).
new_sqlite_classes = ["MatchingRoom"]

[vars]
# SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY should be set via wrangler secret or in .dev.vars for local
# Run: wrangler secret put SUPABASE_URL
# Run: wrangler secret put SUPABASE_SERVICE_ROLE_KEY

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
